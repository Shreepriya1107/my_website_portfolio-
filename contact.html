<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Me</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,sans-serif;
}

body{
    background:#0f172a;
    color:white;
}

.container{
    width:80%;
    max-width:700px;
    margin:80px auto;
}

h1{
    text-align:center;
    color:#e86ccd;
    margin-bottom:30px;
}

.card{
    background:#1e293b;
    padding:30px;
    border-radius:15px;
}

input,
textarea{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
}

button{
    background:#d143c0;
    color:black;
    padding:12px 25px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

a{
    color:#a13c92;
    text-decoration:none;
}

.back{
    display:block;
    text-align:center;
    margin-top:20px;
}

</style>
</head>
<body>

<div class="container">

<h1>Contact Me</h1>

<div class="card">

<p>Email: yourmail@gmail.com</p>
<br>

<p>GitHub: github.com/yourusername</p>
<br>

<p>LinkedIn: linkedin.com/in/yourprofile</p>

<br><br>

<form>

<input type="text" placeholder="Your Name">

<input type="email" placeholder="Your Email">

<textarea rows="5" placeholder="Your Message"></textarea>

<button type="submit">Send Message</button>

</form>

</div>

<a href="index.html" class="back">← Back to Home</a>

</div>

</body>
</html>
